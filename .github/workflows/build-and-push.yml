name: Build and Push Docker Image

env:
  REGISTRY: ghcr.io

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm (needed to build emdash monorepo)
        run: npm install -g pnpm

      - name: Clone emdash from GitHub
        run: git clone --depth=1 https://github.com/emdash-cms/emdash.git tmp/emdash

      - name: Get emdash commit SHA for cache key
        id: emdash-sha
        run: echo "sha=$(git -C tmp/emdash rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Cache emdash tarballs
        id: emdash-cache
        uses: actions/cache@v4
        with:
          path: tmp/emdash-packs
          key: emdash-packs-${{ steps.emdash-sha.outputs.sha }}

      - name: Build and pack emdash packages
        if: steps.emdash-cache.outputs.cache-hit != 'true'
        run: ./scripts/update-emdash.sh --no-pull

      - name: Install npm dependencies
        run: npm install

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
